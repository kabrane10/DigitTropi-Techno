[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "php82Extensions.zip", "nodejs"]

[phases.install]
cmds = ["composer install --optimize-autoloader --no-interaction --no-scripts"]

[phases.build]
cmds = ["php artisan config:cache", "npm install && npm run build"]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"